<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 220"
     width="900"
     height="220">

  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5"
                    flood-color="#000000"
                    flood-opacity="0.35"/>
    </filter>
  </defs>

  <g transform="translate(45,30)" filter="url(#shadow)">
    <ellipse cx="70" cy="40" rx="60" ry="22" fill="url(#gold)"/>
    <circle cx="45" cy="28" r="3" fill="#fff"/>
    <circle cx="65" cy="22" r="3" fill="#fff"/>
    <circle cx="85" cy="28" r="3" fill="#fff"/>
    <circle cx="100" cy="22" r="3" fill="#fff"/>
    <rect x="12" y="58" width="116" height="10" rx="5" fill="#5CAF50"/>
    <rect x="18" y="72" width="104" height="18" rx="9" fill="#7A3E12"/>
    <rect x="14" y="92" width="112" height="8" rx="4" fill="#FBC02D"/>
    <ellipse cx="70" cy="116" rx="60" ry="18" fill="url(#gold)"/>
  </g>

  <text x="180"
        y="130"
        font-size="82"
        font-family="Poppins, Montserrat, Arial, sans-serif"
        font-weight="900"
        fill="url(#gold)"
        filter="url(#shadow)"
        letter-spacing="1">
    Burgerista
  </text>
</svg>
